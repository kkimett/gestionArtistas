{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gestion de Artistas{% endblock %}</title>
    <style>
        :root {
            --color-bg: #f8fafc;
            --color-panel: #ffffff;
            --color-text: #1f2937;
            --color-muted: #6b7280;
            --color-primary: #111827;
            --color-secondary: #e5e7eb;
            --color-danger: #b91c1c;
            --color-border: #d1d5db;
            --shadow: 0 1px 2px rgba(0, 0, 0, .05);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: var(--color-text);
            background: var(--color-bg);
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .app-sidebar {
            width: 260px;
            background: var(--color-panel);
            border-right: 1px solid #e5e7eb;
            box-shadow: var(--shadow);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .app-main {
            flex: 1;
            min-width: 0;
        }

        .container {
            width: calc(100% - 24px);
            max-width: none;
            margin: 0 auto;
            padding: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--color-text);
            font-weight: 700;
            font-size: 16px;
        }

        .brand-logo {
            height: 52px;
            width: auto;
            border-radius: 8px;
            display: block;
            object-fit: cover;
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .side-nav form {
            margin: 0;
            width: 100%;
        }

        .button {
            display: inline-block;
            padding: 9px 13px;
            border-radius: 8px;
            background: var(--color-primary);
            color: #fff;
            text-decoration: none;
            border: 0;
            cursor: pointer;
            font-size: 14px;
        }

        .side-nav .button {
            width: 90%;
            text-align: left;
        }

        .button.secondary {
            background: var(--color-secondary);
            color: var(--color-text);
        }

        .button.danger {
            background: var(--color-danger);
        }

        .panel {
            background: var(--color-panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .meta {
            color: var(--color-muted);
        }

        .errors, .errorlist {
            color: var(--color-danger);
        }

        .errorlist {
            margin: 6px 0 0;
            padding-left: 18px;
        }

        @media (max-width: 900px) {
            .app-layout {
                flex-direction: column;
            }

            .app-sidebar {
                width: auto;
                border-right: 0;
                border-bottom: 1px solid #e5e7eb;
            }

            .side-nav .button {
                text-align: center;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar">
            <a href="{% url 'artists:list' %}" class="brand">
                <img class="brand-logo" src="{% static 'img/logo.jpeg' %}" alt="Logo">
                <span>Gestion de Artistas</span>
            </a>
            {% if user.is_authenticated %}
            <nav class="side-nav">
                <a class="button secondary" href="{% url 'artists:list' %}">Artistas</a>
                <a class="button secondary" href="{% url 'artists:grouping-list' %}">Asociaciones</a>
                <a class="button secondary" href="{% url 'artists:record-list' %}">Registros</a>
                <a class="button secondary" href="{% url 'billing:payment-summary' %}">Pagos</a>
                <!--a class="button secondary" href="{% url 'artists:create' %}">Nuevo artista</a-->
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="button">Cerrar sesion</button>
                </form>
            </nav>
            {% endif %}
        </aside>

        <main class="app-main container">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
